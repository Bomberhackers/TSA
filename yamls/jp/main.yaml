name: Baku Bomberman 2 (JP)
basename: bm64tsa
sha1: 1376a3147dbda940548683d04922b9e56f7a538b
options:
  compiler: IDO
  symbol_addrs_path: linker_scripts/jp/symbol_addrs.txt
  target_path: baserom.decomp.jp.z64
  basename: bm64tsa
  base_path: .
  ld_script_path: bm64tsa.decomp.jp.ld
  platform: n64
  detect_redundant_function_end: true
  hasm_in_src_path: True
  asm_path: asmjp
  src_path: srcjp
  asset_path: assetsjp
  build_path: build/jp
  undefined_funcs_auto_path: linker_scripts/jp/auto/undefined_funcs_auto.ld
  undefined_syms_auto_path: linker_scripts/jp/auto/undefined_syms_auto.ld
segments:
  - name: header
    type: header
    exclusive_ram_id: code
    start: 0x00
    vram: 0
    subsegments:
    - [0x0000, header, header]
  - name: boot
    type: code
    start: 0x0040
    vram: 0xA4000040
    subsegments:
    - [0x0040, asm, boot]
    - [0x0B70, bin, bootcode_font]
